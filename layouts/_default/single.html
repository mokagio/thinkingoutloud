{{ define "title" }}{{ .Title }} &mdash; {{ .Site.Title }}{{ end }}
{{ define "main" }}
<article>
<h1>{{ .Title }}</h1>
<time datetime="{{ .Date.Format "2006-01-02" }}">{{ .Date.Format "2006-01-02" }}</time>
{{ .Content }}
</article>
<nav>
<a href="{{ .Site.Home.RelPermalink }}">home</a>
{{ with .NextInSection }} &middot; <a href="{{ .RelPermalink }}">prev</a>{{ end }}
{{ with .PrevInSection }} &middot; <a href="{{ .RelPermalink }}">next</a>{{ end }}
</nav>
{{ end }}
