{{ define "main" }}

{{ $posts := where .Site.RegularPages "Section" "posts" }}
{{ $paginator := .Paginate $posts }}

<ul>
    {{ range $paginator.Pages }}
    <li>
        <a href="{{ .RelPermalink }}">
            {{- .Title | markdownify }}
        </a>
        {{ partial "post_meta.html" . }}
    </li>
    {{ end }}
</ul>

{{ template "_internal/pagination.html" . }}

{{ end }}
